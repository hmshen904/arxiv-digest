name: Update Reading List

on:
  issues:
    types: [edited]

permissions:
  contents: read
  issues: write

jobs:
  update-reading-list:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'arxiv-summary')
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Update reading list
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run src/reading_list.py
